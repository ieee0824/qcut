name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  release:
    name: Release (${{ matrix.os_name }})
    needs: quality-gate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os_name: linux
            arch: amd64
            rust_target: ''
            tauri_args: ''
          - platform: macos-latest
            os_name: darwin
            arch: aarch64
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            os_name: windows
            arch: x64
            rust_target: ''
            tauri_args: ''
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Override productName for beta
        if: contains(github.ref_name, '-beta')
        shell: bash
        run: |
          # tauri.conf.json の productName を qcut-beta に変更
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.productName = 'qcut-beta';
            conf.app.windows[0].title = 'qcut-beta - Video Editor';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build Tauri app
        shell: bash
        run: npx tauri build ${{ matrix.tauri_args }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Collect and rename artifacts
        shell: bash
        run: |
          mkdir -p upload
          OS="${{ matrix.os_name }}"
          ARCH="${{ matrix.arch }}"
          VERSION="${GITHUB_REF_NAME}"
          find src-tauri/target -path "*/bundle/*" \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
               -o -name "*.deb" -o -name "*.AppImage" -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \
               -o -name "*-setup.exe" -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \
               -o -name "*.msi" -o -name "*.msi.zip" -o -name "*.msi.zip.sig" \) \
            2>/dev/null | while read f; do
              ext="${f##*.}"
              # Handle compound extensions
              case "$f" in
                *.app.tar.gz.sig) ext="app.tar.gz.sig" ;;
                *.app.tar.gz)     ext="app.tar.gz" ;;
                *.AppImage.tar.gz.sig) ext="AppImage.tar.gz.sig" ;;
                *.AppImage.tar.gz)     ext="AppImage.tar.gz" ;;
                *.nsis.zip.sig)   ext="nsis.zip.sig" ;;
                *.nsis.zip)       ext="nsis.zip" ;;
                *.msi.zip.sig)    ext="msi.zip.sig" ;;
                *.msi.zip)        ext="msi.zip" ;;
                *-setup.exe)      ext="setup.exe" ;;
              esac
              cp "$f" "upload/qcut-${VERSION}-${OS}-${ARCH}.${ext}"
          done
          echo "Artifacts to upload:"
          ls -la upload/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          files: upload/*

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    # beta / 正式リリースどちらでも homebrew-tap を更新
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Determine version and cask
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-beta* ]]; then
            echo "cask=qcut-beta" >> "$GITHUB_OUTPUT"
          else
            echo "cask=qcut" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macOS DMG and compute sha256
        id: sha
        run: |
          curl -sL "https://github.com/ieee0824/qcut/releases/download/v${{ steps.meta.outputs.version }}/qcut-v${{ steps.meta.outputs.version }}-darwin-aarch64.dmg" -o /tmp/qcut.dmg
          HASH=$(sha256sum /tmp/qcut.dmg | awk '{print $1}')
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for homebrew-tap
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Clone and update homebrew-tap
        run: |
          git clone git@github.com:ieee0824/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          CASK="${{ steps.meta.outputs.cask }}"
          VERSION="${{ steps.meta.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          CASK_FILE="Casks/${CASK}.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$CASK_FILE"
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$CASK_FILE"
          sed -i 's|/qcut[^"]*\.dmg|/qcut-v#{version}-darwin-aarch64.dmg|' "$CASK_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git commit -m "${CASK} cask を v${VERSION} に更新"
          git push
