name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  release:
    name: Release (${{ matrix.os_name }})
    needs: quality-gate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os_name: linux
            rust_target: ''
            tauri_args: ''
          - platform: macos-latest
            os_name: macos
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            os_name: windows
            rust_target: ''
            tauri_args: ''
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Tauri app
        shell: bash
        run: npx tauri build ${{ matrix.tauri_args }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Collect and rename artifacts
        shell: bash
        run: |
          mkdir -p upload
          find src-tauri/target -path "*/bundle/*" \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
               -o -name "*.deb" -o -name "*.AppImage" -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \
               -o -name "*-setup.exe" -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \
               -o -name "*.msi" -o -name "*.msi.zip" -o -name "*.msi.zip.sig" \) \
            2>/dev/null | while read f; do
              basename="$(basename "$f")"
              cp "$f" "upload/${{ matrix.os_name }}-${basename}"
          done
          echo "Artifacts to upload:"
          ls -la upload/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ contains(github.ref_name, '-beta') }}
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          files: upload/*
