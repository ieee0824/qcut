name: 機能リクエスト
description: 新機能の提案
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能リクエストをありがとうございます。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どのような課題や不便さがありますか？
      placeholder: 現在、〜〜ができなくて困っています
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能があれば解決できますか？
      placeholder: 〜〜という機能があれば...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えられる解決方法はありますか？
      placeholder: または、〜〜という方法も...

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      description: あなたにとってどの程度重要ですか？
      options:
        - 低 - あると便利
        - 中 - かなり欲しい
        - 高 - 必須機能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: ユースケース
      description: 具体的にどのような場面で使用しますか？
      placeholder: 学校の課題動画を作成する際に...

  - type: textarea
    id: additional
    attributes:
      label: 追加情報
      description: その他、参考になる情報があれば
      placeholder: 他のソフトウェアでの実装例など
